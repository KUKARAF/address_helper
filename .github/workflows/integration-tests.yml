name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Get package version
        id: pkg-version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download released address DB
        id: download-db
        continue-on-error: true
        run: |
          mkdir -p ~/.address-standardizer
          curl -fL \
            "https://github.com/KUKARAF/address_helper/releases/download/v${{ steps.pkg-version.outputs.version }}/DE-addresses.osm.db" \
            -o ~/.address-standardizer/DE-addresses.osm.db.v${{ steps.pkg-version.outputs.version }}

      - name: Run integration tests (100 real addresses)
        if: steps.download-db.outcome == 'success'
        run: python -m pytest tests/test_integration_addresses.py -v

      - name: Run all unit tests
        run: python -m pytest tests/ -v --cov=address_standardizer --ignore=tests/test_integration_addresses.py
