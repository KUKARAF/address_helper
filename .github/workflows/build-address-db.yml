name: Build Address DB

on:
  workflow_dispatch:
  push:
    paths:
      - 'address_standardizer/db.py'
      - 'address_standardizer/query.py'
      - 'address_standardizer/downloader.py'
      - 'address_standardizer/postcode_filter.py'
      - 'address_standardizer/models/region.py'
      - 'pyproject.toml'
      - '.github/workflows/build-address-db.yml'
    branches:
      - main

permissions:
  contents: write

jobs:
  build-db:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract package version
        id: pkg-version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Package version: v${VERSION}"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download OSM PBF and build DB
        run: |
          python -c "
          from address_standardizer.db import AddressDB
          from address_standardizer.models.region import get_country_region
          from pathlib import Path
          import requests

          # Always download from Geofabrik source (full PBF) — not the minified version
          region = get_country_region('DE')
          url = region.full_file.url
          pbf_path = Path('DE-addresses.osm.pbf')

          print(f'Downloading full PBF from {url}...')
          response = requests.get(url, stream=True)
          response.raise_for_status()
          total = int(response.headers.get('content-length', 0))
          done = 0
          with open(pbf_path, 'wb') as f:
              for chunk in response.iter_content(chunk_size=65536):
                  if chunk:
                      f.write(chunk)
                      done += len(chunk)
                      if total:
                          print(f'  {done/total*100:.1f}%', end='\r', flush=True)
          print(f'\nDownloaded {pbf_path.stat().st_size / (1024**3):.1f}GB')

          print(f'Building DB from {pbf_path}...')
          db = AddressDB(pbf_path)
          db.close()

          db_path = Path('DE-addresses.osm.db')
          if db_path.exists():
              size_gb = db_path.stat().st_size / (1024**3)
              print(f'✓ DB built successfully: {size_gb:.1f}GB')
          else:
              raise FileNotFoundError('DB file not created')
          "

      - name: Calculate checksum
        run: |
          md5sum DE-addresses.osm.db | awk '{print $1}' > DE-addresses.osm.db.md5
          cat DE-addresses.osm.db.md5

      - name: Get DB size
        id: db-info
        run: |
          SIZE=$(du -h DE-addresses.osm.db | cut -f1)
          MD5=$(cat DE-addresses.osm.db.md5)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT

      - name: Run integration tests against built DB
        env:
          ADDRESS_STANDARDIZER_DB_PATH: ${{ github.workspace }}/DE-addresses.osm.db
        run: python -m pytest tests/test_integration_addresses.py -v

      # Manual upload step (requires SSH key on runner):
      # After build completes, download artifacts and run:
      #   ./.tools/upload_static_osmosis_page.sh DE-addresses.osm.db
      # This will upload both DB and .md5 sidecar to static.osmosis.page
      # and output the checksum for links.toml

      - name: Create Release (tag + MD5 only)
        uses: softprops/action-gh-release@v2
        with:
          files: DE-addresses.osm.db.md5
          tag_name: ${{ steps.pkg-version.outputs.version }}
          name: Address DB ${{ steps.pkg-version.outputs.version }}
          make_latest: true
          body: |
            Address database for address-standardizer ${{ steps.pkg-version.outputs.version }}

            Built from commit: ${{ github.sha }}

            **Download:** https://static.osmosis.page/osm/DE-addresses.osm.db

            **Database Info:**
            - Size: ${{ steps.db-info.outputs.size }}
            - MD5: `${{ steps.db-info.outputs.md5 }}`
            - Timestamp: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
