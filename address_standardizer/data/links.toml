# links.toml
# Maps ISO 3166-1 alpha-2 country codes to OSM PBF URLs.
#
# Each entry has:
#   source_url      = Full Geofabrik PBF (used by CI/CD to download and minify)
#   source_checksum = Geofabrik MD5 checksum URL
#   pbf_url         = Minified PBF on static.osmosis.page (used by library)
#   checksum_url    = Minified PBF MD5 checksum URL
#
# Flow 1 (CI/CD): Downloads source_url → minifies → uploads → updates pbf_url
# Flow 2 (Library): Only uses pbf_url to download minified file
#
# Minified files contain only address-relevant OSM tags (see osm-filter-spec.md).

[meta]
schema_version = "1"
last_updated = "2024-01-15T12:00:00Z"

[countries.DE]
name = "Germany"
# Source: Full Geofabrik PBF (used by CI/CD Flow 1)
source_url = "https://download.geofabrik.de/europe/germany-latest.osm.pbf"
source_checksum = "https://download.geofabrik.de/europe/germany-latest.osm.pbf.md5"
# Minified: Address-only PBF (used by Library Flow 2, updated by CI/CD)
pbf_url = "https://static.osmosis.page/osm/DE-addresses.osm.pbf"
checksum_url = "https://static.osmosis.page/osm/DE-addresses.osm.pbf.md5"
# Pre-built SQLite index (faster alternative to building from PBF)
db_url = "https://static.osmosis.page/osm/DE-addresses.osm.db"
db_checksum = "db72ef2b3322a47c4bac40c2010b4464"

